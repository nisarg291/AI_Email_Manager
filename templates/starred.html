{% extends "base.html" %}{% block title %}Starred{% endblock %}
{% block body %}
<h2 class="mb-4"><i class="bi bi-star-fill text-warning"></i> Starred</h2>
{% if error %}<div class="alert alert-danger">{{ error }}</div>{% endif %}
<div class="card border-0 shadow-sm"><div class="table-responsive">
<table class="table mb-0"><thead class="table-light"><tr><th>From / Subject</th><th>Snippet</th></tr></thead><tbody>
{% for m in items %}
<tr>
    <td colspan="2">
        <a href="{% url 'email_detail' m.id %}?back=starred"
           class="text-decoration-none text-dark d-block">

            <div class="d-flex justify-content-between">
                <div>
                    <div class="text-muted small">{{ m.from }}</div>
                    <div>{{ m.subject }}</div>
                </div>

                <div class="text-muted small">
                    {{ m.snippet|truncatechars:100 }}
                </div>
            </div>

        </a>
    </td>
</tr>
{% empty %}<tr><td colspan="2" class="text-muted text-center py-4">No starred emails.</td></tr>{% endfor %}
</tbody></table></div></div>
{% endblock %}
