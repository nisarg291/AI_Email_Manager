{% extends "base.html" %}{% block title %}Categories{% endblock %}
{% block topbar_title %}Categories{% endblock %}
{% block body %}
<div class="d-flex justify-content-between align-items-center mb-4">
  <div>
    <h2 class="mb-1 fw-bold">Category preferences</h2>
    <p class="text-muted mb-0">Tell the AI which emails matter more.</p>
  </div>
</div>
<form method="post" style="max-width:1000px">{% csrf_token %}
  {% include "_tier_picker.html" with cat_groups=cat_groups %}
  <button class="btn btn-primary px-4">Save preferences</button>
</form>
{% endblock %}
